seeker:
  # --- PPO Rollout ---
  # Collect 2048 steps per update regardless of episode boundaries.
  # Matches common PPO defaults (e.g. Stable-Baselines3, CleanRL).
  n_steps: 2048
  n_epochs: 10
  mini_batch_size: 64

  # --- PPO Clipping ---
  clip_epsilon: 0.2

  # --- Advantage Estimation ---
  gae_lambda: 0.95

  # --- Discount ---
  # MAX_GOAL_SEARCH_SECONDS = 30s at free-running rate ≈ 900 steps.
  # 0.999^900 ≈ 0.41 — retains meaningful credit across the full search.
  discount_factor_g: 0.999

  # --- Loss Coefficients ---
  entropy_coeff: 0.01
  value_loss_coeff: 0.5

  # --- Optimiser ---
  learning_rate_a: 0.0003

  # --- Gradient Clipping ---
  max_grad_norm: 0.5

  # --- Stopping ---
  stop_on_reward: 999999

  # --- Architecture ---
  # 209 inputs → [256, 256, 128] → 7 outputs (Actor & Critic both).
  hidden_dims: [256, 256, 128]

  env_make_params:
    use_lidar: False