seeker:
  # --- PPO Rollout ---
  # 4096 steps captures ~2 full episodes (avg ~1800 steps) per update,
  # giving PPO more complete trajectories for advantage estimation.
  n_steps: 8192
  n_epochs: 10
  mini_batch_size: 1024

  # --- PPO Clipping ---
  clip_epsilon: 0.1

  # --- Advantage Estimation ---
  gae_lambda: 0.95

  # --- Discount ---
  # MAX_GOAL_SEARCH_SECONDS = 30s at free-running rate ≈ 900 steps.
  # 0.999^900 ≈ 0.41 — retains meaningful credit across the full search.
  discount_factor_g: 0.999

  # --- Reward Scaling ---
  # Divides every reward before it enters the buffer, keeping discounted
  # returns in a unit-ish range without per-batch normalization (which
  # breaks mid-training checkpoint resumes).
  reward_scale: 0.1

  # --- Loss Coefficients ---
  entropy_coeff: 0.01
  value_loss_coeff: 1.0

  # --- Optimiser ---
  learning_rate_a: 0.00005

  # --- LR Decay ---
  # Cosine anneal from learning_rate_a down to lr_min over lr_decay_episodes.
  lr_min: 0.00003
  lr_decay_episodes: 400

  # --- Gradient Clipping ---
  max_grad_norm: 1.0

  # --- Stopping ---
  stop_on_reward: 999999

  # --- Architecture ---
  # 209 inputs → [256, 256, 128] → 7 outputs (Actor & Critic both).
  hidden_dims: [256, 256, 128]

  env_make_params:
    use_lidar: False